schedule:
  # 1日3回の固定スケジュール (JST)
  cron_hours: "8,12,22"
  cron_minutes: "30,0,0"

collectors:
  rss:
    enabled: true
    feeds:
      # 米国株
      - name: "Yahoo Finance US"
        url: "https://finance.yahoo.com/news/rssindex"
      - name: "CNBC Top News"
        url: "https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=100003114"
      - name: "Seeking Alpha"
        url: "https://seekingalpha.com/market_currents.xml"
      - name: "MarketWatch"
        url: "https://feeds.marketwatch.com/marketwatch/topstories/"
      # 日本株
      - name: "Yahoo Finance Japan"
        url: "https://news.yahoo.co.jp/rss/topics/business.xml"
      - name: "日経新聞 マーケット"
        url: "https://assets.wor.jp/rss/rdf/nikkei/markets.rdf"
      - name: "日経新聞 経済"
        url: "https://assets.wor.jp/rss/rdf/nikkei/economy.rdf"
      - name: "ロイター Japan"
        url: "https://assets.wor.jp/rss/rdf/reuters/top.rdf"
      - name: "株探ニュース"
        url: "https://kabutan.jp/news/marketnews/?rss=1"
  newsapi:
    enabled: true
    queries:
      - "stock market IPO 2026"
      - "US investment policy announcement"
      - "Japan stock market Nikkei"
      - "日本株 IPO 新規上場"
    page_size: 20
    interval_minutes: 120  # Longer interval to stay within free tier
  sec:
    enabled: true
    form_types: ["S-1", "S-1/A"]
    lookback_days: 3
  twitter:
    enabled: false
    accounts:
      - "unusual_whales"
      - "DeItaone"
      - "zabormarket"
    cashtags:
      - "$SPY"
      - "$QQQ"

analysis:
  claude_model: "claude-sonnet-4-20250514"
  max_items_per_batch: 50
  focus_areas:
    - "upcoming_ipo"
    - "policy_announcement"
    - "sector_rotation"
    - "basket_buying"
    - "earnings_catalyst"

notifications:
  urgent_threshold: 0.80
  min_confidence: 0.40
  dedup_window_hours: 24

