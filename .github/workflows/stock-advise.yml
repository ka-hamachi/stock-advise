name: Stock Advise Pipeline

on:
  schedule:
    # JST = UTC+9 なので9時間引く
    - cron: "0 23 * * *"    # 08:00 JST (前日23:00 UTC)
    - cron: "0 13 * * *"    # 22:00 JST (13:00 UTC)
  workflow_dispatch: {}      # 手動実行も可能

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --no-cache-dir -e .

      - name: Create data directory
        run: mkdir -p data

      - name: Verify latest code
        run: |
          echo "=== Latest commit ==="
          git log --oneline -1
          echo "=== claude_analyzer.py has SYSTEM_PROMPT_US? ==="
          grep -c "SYSTEM_PROMPT_US" src/analysis/claude_analyzer.py
          grep -c "SYSTEM_PROMPT_JP" src/analysis/claude_analyzer.py

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL_URGENT: ${{ secrets.SLACK_WEBHOOK_URL_URGENT }}
        run: python scripts/run_once.py
